changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: New Features
      labels:
        - feature
        - enhancement
    - title: Bug Fixes
      labels:
        - bug
        - fix
    - title: Agent & Session System
      labels:
        - agents
        - sessions
    - title: AI Provider
      labels:
        - ai-provider
    - title: Build & CI
      labels:
        - ci
        - build
    - title: Documentation
      labels:
        - documentation
        - docs
    - title: Other Changes
      labels:
        - '*'
